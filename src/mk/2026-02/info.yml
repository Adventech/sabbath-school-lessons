  title: "Растење во односот со Бога"
  description: "Твојата лична заедница со Бога е единствената најважна заедница. Не го одложувај делото да ја изградуваш, да ја зајакнуваш и ја направиш твојата заедница со Бога што е можно посилна и цврста. Сега - не во некое време во иднина - сега е вистинскиот момент да работите на личната заедница со Бога, која ќе влијае на сè друго во вашиот живот: на вашиот брак (ако сте во брак), на вашето родителство (ако сте родител), на вашите пријателства, вашите финансиски одлуки, слободното време, желбите и стремежите... и секако, на вашата вечна иднина."
