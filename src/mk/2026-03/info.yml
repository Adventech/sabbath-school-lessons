---
  title: "Првото и второто послание до Коринтјаните"
  description: "Во времето на Павле, Коринт бил познат по своето богатство и развиена трговија, благодарение токму на пристаништето, архитектурата, бродоградбата и грнчарството. Тој град бил важен финансиски центар. Но покрај тоа, бил познат и по својот сексуален неморал, верска дисхармонија и по храмовите посветени на разни богови. Всушност, секојдневниот живот во Коринт бил обележан со нескриено идолопоклонство. Оваа историска и културна заднина ни помага да ги разбереме главните грижи на Павле во врска со христијаните во тој град и, соодветно на тоа, опомените што тој им ги упатува. Ова тримесечје ќе ги проучуваме Павловите писма до Коринтјаните. Во овие две извонредни новозаветни книги, апостолот ја прикажува евангелската порака како суштина на христијанскиот живот и сведочење, како призма низ која треба да се гледа сè друго. Без оглед на предизвиците со кои се соочуваме како поединци или како црква на нашиот пат кон небото, одговорот на најсложените прашања во нашата работа за Христа е истиот оној што важел и за Коринтјаните: „Исус Христос, и тоа распнатиот!“ (1. Коринтјаните 2,2) Исус доаѓа наскоро. Ова е време за уште поголемо единство во Христа и отвореност за Светиот Дух како никогаш досега, за вредно користење на духовните дарови и многу подлабоко искуство со нашиот воскреснат Господ. Време е за вистинска христијанска служба, за учество во повереничката служба и мисијата, за духовна борба против лажните учења, за растење во благодатта, љубовта и заедништвото. Ова е време кога треба да се држиме цврсто и да бидеме верни на пораката за Крстот, а Павловите писма до Коринтјаните нè учат токму на тоа."
