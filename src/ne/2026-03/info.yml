  title: "पहिलो र दोस्रो कोरिन्थी"
  description: "प्राचिन समयदेखि हुँदैआएको पत्रहरू लेख्ने चलन आजको एकाइसौँ शताब्दीको अन्धाधुन्ध वैज्ञानिक प्रगतिमा पनि लोप भएको छैन। पत्र लेख्ने तरिका वा माध्यम मात्र हामीले बदलेका छौं। हो, आजको सामाजिक सञ्जालले गर्दा कागजमा लेखिने कुराहरू न्युन भइरहेका छन्। तर इमेल र विभिन्न विद्युतिय माध्यमहरूबाट प्रसारण गर्ने सन्देशहरूको काम आधारभूतमा एउटै हो: मानिसहरूका भावना, सोचविचार र सन्देशहरू मानिसहरूका बीचमा पुऱ्याउनु।"
