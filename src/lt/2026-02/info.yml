  title: "Santykių su Dievu gilinimas"
  description: "SANTYKIŲ SU DIEVU GILINIMAS Nesvarbu, ar užaugote kaip septintosios dienos adventistas, ar esate naujokas tikėjime; ar skaitėte daug Sabatos mokyklos pamokų, ar mažai; galiausiai nesvarbu, koks šiandien jūsų dvasinis gyvenimas, tema – kaip gilinti prasmingus santykius su Dievu – labai svarbi. Ši tema paveikia visas kitas. Susidarytas Dievo paveikslas gali tapti suteptas ar neaiškus; jei taip, melskite didesnio aiškumo tyrinėdami. Galbūt svarstote, kaip atnaujinti savo dvasinį gyvenimą (malda ir Biblijos tyrinėjimu), galbūt apmąstote kitas sritis, kurios turi įtakos jūsų santykiams su Dievu, pavyzdžiui, puikybės ir nuolankumo, tikėjimo ir pažinimo, nuodėmės ir Dievo Įstatymo, atgailos ir atleidimo vaidmenį, kaip įveikti nesėkmes ir kaip padrąsinti kitus jų kelyje su Dievu. Jūsų santykiai su Dievu yra patys svarbiausi. Nedelskite juos kurti, stiprinti, padaryti kuo stipresnius. Dabar, o ne kada nors ateityje, pats laikas darbuotis vardan šių santykių, kurie paveiks visa kita – jūsų santuoką (jei esate susituokę), jūsų tėvystę (jei turite vaikų), jūsų draugystę, jūsų finansinius sprendimus, jūsų laisvalaikį, jūsų siekius... ir, žinoma, jūsų amžinąją ateitį. Kadangi ši tema – Dievo troškimas palaikyti santykius su žmonija – apima visą Bibliją, yra daug skirtingų kampų, pasakojimų ir Biblijos tekstų, kuriuos būtų galima pasirinkti tyrinėjant šią svarbią temą. Atsižvelgiant į Sabatos mokyklos pamokų išdėstymą, galime tyrinėti tik tryliką šių temų. Kad ir kokie būtų jūsų santykiai su Dievu šiandien, šios pamokos parašytos galvojant apie jus. Galiausiai norima, kad šios trylika trumpų, koncentruotų pamokų pažadintų jūsų meilę ir pasišventimą Jėzui Kristui, kai šį ketvirtį iš naujo Jo ieškosite. Kadangi šios temos yra susijusios su santykiais, šios Sabatos mokyklos pamokos šiek tiek skirsis nuo ankstesnių. Jos parašytos asmeniškesniu stiliumi, nes jos yra susijusios su asmeniniu Dievu, kuris nori jus asmeniškai pažinti. E. Vait rašė: „Nuoseklus gyvenimas Kristuje – didžiulis stebuklas“ 2011, p. 375 (Su meile iš Dangaus,). Biblijoje gyvenimo kelionei su Dievu apibūdinti naudojama lenktynių metafora. Mūsų atlygis – nevystantis vainikas (1 Kor 9, 24–25) ir amžinas gyvenimas su Dievu. Mūsų dvasinės lenktynės yra maratonas, o ne sprintas. Gali pasitaikyti, kad bėgdami sustojame ar net pargriūvame veidu į žemę. Taip nutinka, ir kai nutinka, mes tiesiog atsikeliame ir bėgame toliau. Turime išlikti teisingame kelyje, nepaisant neišvengiamų išmėginimų ir sunkumų (Hbr 12, 4–11). Mes šiose lenktynėse ne vieni; kiti bėgikai, kurie myli Jėzų ir Jo Žodį, bėga kartu su mumis. Svarbiausia, kad Jėzus pažadėjo duoti mums Globėją. „Aš paprašysiu Tėvą, ir Jis duos jums kitą Globėją, kuris liktų su jumis per amžius, – Tiesos Dvasią, kurios pasaulis neįstengia priimti, nes Jos nemato ir nepažįsta. O jūs Ją pažįstate, nes Ji yra pas jus ir bus jumyse“ (Jn 14, 16–17). Gyvenimo lenktynėse esame ne vieni – Globėjas yra ne tik su mumis, bet ir gyvena mumyse, kad mus sustiprintų ir palaikytų, kai bėgame ir kai sutelkiame žvilgsnį „į savo tikėjimo Vadovą ir Ištobulintoją Jėzų“ (Hbr 12, 2).  Rašydama meldžiu, kad Šventoji Dvasia veiktų mus asmeniškai ir pasaulinę Bažnyčią, priartindama mus prie Dievo kaip niekada anksčiau. Nes tikrai negali būti nieko svarbiau už tvirtą ryšį su Dievu. Tad tyrinėkime kartu, mokykimės, mylėkime ir pasilikime Jame. Nina Atcheson yra Generalinės konferencijos „Alive in Jesus“ (Gyvi Jėzuje) Sabatos mokyklos programos vadovė ir vyresnioji redaktorė. Ji gyvena tam, kad įkvėptų ir padėtų kitiems giliai ir asmeniškai pažinti Dievą per Jo įkvėptą Žodį. Nina Atcheson yra ištekėjusi už Mato. Jie kartu augina tris paauglius."
