---
  title: "Vækst i gudsforholdet"
  description: "Uanset om du er ny i troen eller er vokset op som kristen, og uanset hvor mange eller få bibelstudier du har været igennem i dit liv, eller hvor du lige nu er på din åndelig rejse, er emnet for dette kvartal relevant. Alt står og falder nemlig med din relation til Gud. Måske har du et anstrengt forhold til Gud, og ved ikke længere, hvad du skal tro. Måske føler du, at dit åndelige liv trænger til en overhaling. Måske kunne du godt lide at vide, hvilken betydning f.eks. stolthed og ydmyghed, tro og viden, synd og Guds lov, anger og tilgivelse har for dit gudsforhold, og måske spekulerer du på, hvordan du kan imødegå modgang og prøvelser, uden at dit gudsforhold lider et knæk. Måske kunne du bare godt tænke dig at finde ud af, hvordan du bedst kan være til støtte og opmuntring for andre i deres vandring med Gud."
