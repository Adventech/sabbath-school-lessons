---
  title: "The Closing Scenes"
  description: "The Bible makes an incredible claim about God in 1 John 4:8: God is love. It doesn’t say He merely possesses a certain amount of love or is occasionally loving, but that He is the embodiment and source of all true love. In 1 Corinthians 13:5, we learn that love, by its very nature, is not self-centered—it focuses on others. Nowhere is this “other-centered” love more vividly displayed than in the closing scenes of Jesus’ life on earth."
