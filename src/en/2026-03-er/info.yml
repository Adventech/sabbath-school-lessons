  title: "First and Second Corinthians"
  description: "People have written letters since ancient times. We continue to write them today. We write and send them in more modern ways. For the most part, emails replace paper, ink, envelopes, and stamps. But however we write letters now, we continue to write them for the same reason people wrote them long ago. We want to connect with other people to exchange information, feelings, and ideas."
