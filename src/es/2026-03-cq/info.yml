---
  title: "Las escenas finales"
  description: "La Biblia hace una afirmación sorprendente sobre Dios en 1 Juan 4: 8: Dios es amor. No dice simplemente que él posee una cierta cantidad de amor o que ocasionalmente muestra amor, sino que él es la encarnación y la fuente de todo amor verdadero. En 1 Corintios 13: 5, aprendemos que el amor, por su propia naturaleza, no es egocéntrico, sino que coloca su atención en los demás. En ningún lugar se muestra más vívidamente este amor «centrado en los demás» que en las escenas finales de la vida de Jesús en la tierra."
