---
  title: "“1ኛ"
  description: "ደብዳቤ መጻፍ ብዙ ዘመናትን ያስቆጠረ ነገር ግን ያልቀረ ተግባር ነው። እኛ ፊደሎች የሚጻፉበትን መንገድ ብቻ ቀይረናል። አዎ፣ ወረቀት በማህበራዊ ሚዲያ ተተካ። ነገር ግን፣በይዘታቸው፣ ኢሜይሎች እና ሌሎች የኤሌክትሮኒክ ፊደሎች መሠረታዊ በሆነ መንገድ አንድ አይነት ተግባር ያከናውናሉ፤ ይህም መረጃን፣ ስሜትን እና ሀሳቦችን በማለዋወጥ ሰዎችን ማገናኘት ነው።"
