  title: "1 ба 2 Коринт"
  description: "Захидал бол эрт дээр үеэс уламжилж ирсэн, хэзээ ч хуучрашгүй харилцааны нэг хэлбэр юм. Захидлыг өнөө үед сошиал медиа орложээ. Гэхдээ мөн чанарын хувьд имэйл болон бусад цахим захидал нь гараар бичдэг байсан захидалтай яг ижил үүргийг гүйцэтгэдэг: эдгээр нь мэдээлэл, мэдрэмж, бодол санаагаа солилцох замаар хүмүүсийг хооронд нь холбодог хэрэгсэл билээ. Хүмүүс яагаад захидал бичдэг вэ? Хүмүүст хэлэх ямар нэгэн зүйл байгаа учраас захидал бичдэг гэх болов уу. Элч Паулд хэлэх зүйл их байсан ч, ярилцахыг хүсэж байсан хүмүүстэйгээ нүүр нүүрээ харан уулзаад байх боломж байнга олдоод байсангүй."
