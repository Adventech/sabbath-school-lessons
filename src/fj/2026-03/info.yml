  description: "Esega ni sa oti na gauna ni vola i vola, me vaka ea dau vakayacori tu mai ena veigauna makawa sa oti yani. Eda sa rairai mai veisautaka ga na i vukivuki ni volavola. Io, esa mai sosomitaki veva ga o mona livaliva. Ia, ena nodra i tutu na drauniveva, era sa cakacaka tiko kina edaidai na iVola vakau ena mona livaliva (email) kei na so tale na i yaya vakalivaliva era sa vakayagataki tu edaidai: era sa mai semati keda vata ena kena veisolitaki nai vei tukutuku eso, na veivakasama e tu kei na vei ka e tara na ivakarau ni lomada."
