---
  title: "Tubu na Veiwekani Vata kei na Kalou"
  description: "Veitalia madaga kevaka ko tubu cake ga mai ena lomani lotu ni kavitu ni Lesu vakarua mai, se oiko e dua na leweni lotu vou, veitalia na kena levu ni nomu dau wilika se vakalailai na I Dusidusi ni VulivolaTabu ni qase ni lotu ni kavitu, se vakacava sara mada nai Vakatagedegede ni nomu bula vakayalo ena gauna oqo. Ena rawa ni vukei iko ena nomu veiwekani vakaibalebale kei na Kalou se sa kakaremoremo ka buwawa beka na nomu raica na Kalou oqo, kevaka e vakakina masulaka me veivakararamataki na Kalou ena nomu vulica na lesoni oqo: iko beka edua ko sa vinakata mo vakabulabulataka na nomu bula ni daumasu, ka vulica nona vosa, se tikina cava beka ena rawa ni vakayavalata nomu veiwekani kei na Kalou, me vakataka na bula ni dokadoka, nanumi iko ga vakataki iko, na bula ni vakabauta, na yalomatuataki ni valavala ca, kei na Vunau ni Kalou.Veivutuni keina dau veivosoti, rawati na bula qaqa ka vanadakui na bula makawa, ka vakayaloqaqataki ira na tani ena nodra veiwekani kei na Kalou."
