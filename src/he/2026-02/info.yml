---
  title: "צמיחה אישית במערכת יחסים עם אלוהים"
  description: "בין אם גדלתם בקהילת מאמינים אדוונטיסטית ובין אם אתם חדשים בדרך האמונה; בין אם עברתם כבר דרך ארוכה עם מדריכי לימוד מקראיים או שזהו המפגש הראשון שלכם עם מדריך מסוג זה, ואין זה משנה כלל היכן אתם נמצאים מבחינה רוחנית כיום, הנושא של צמיחה במערכת יחסים עמוקה ומשמעותית עם אלוהים הוא מהותי, יסודי וחשוב. זהו תחום שמקרין ומשפיע על כל היבט אחר בחיים. יתכן שהתמונה שיש לכם על אלוהים התערפלה או השתבשה עם הזמן. אם כך, התפללו שבמהלך לימוד דברו תזכו לבהירות מחודשת. אולי אתם תוהים איך לרענן את חיי האמונה האישיים, את התפילה ולימוד הכתובים, ואולי דווקא עולות בכם שאלות בנוגע להיבטים נוספים שמשפיעים על הקשר שלכם עם אלוהים: כמו תפקידה של הגאווה מול הענווה, ההבדל בין אמונה וידיעה, ההתמודדות עם חטא לאור תורת אלוהים, המשמעות של חזרה בתשובה וסליחה, ההתמודדות עם נפילות ומאבקים במבצרים פנימיים, ואיך אפשר לעודד אחרים במסע הרוחני שלהם. הקשר שלכם עם אלוהים הוא הקשר החשוב ביותר בחייכם. אל תדחו  את בנייתו, חיזוקו, והפיכתו ליציב ככל האפשר. "
