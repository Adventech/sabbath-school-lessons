  description: "ඔබ වැඩිහිටි සෙවන්ත්ඩේ-ඇඩ්වෙන්ටිස්වරයෙකු හෝ ඇදහිල්ලට අලුතින් එක්වූ තැනැත්තෙකු හෝ වුවත්, ඔබ වැඩිහිටි සබත් පාසල් බයිබල් අධ්‍යයන මාර්ගෝපදේශ බොහොමයක් හෝ කිහිපයක් කියවා ඇති තැනැත්තකෙ= වුවත්, සහ අද දවසේ ඔබ ආත්මිකව කුමන මට්ටමක සිටියත්, දෙවියන්වහන්සේ සමග අර්ථවත් සම්බන්ධතාවයකින් වර්ධනය වීම යන මාතෘකාව අතිශයින් වැදගත් වේ."
