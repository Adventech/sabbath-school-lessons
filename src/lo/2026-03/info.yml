  title: "ພຣະທໍາໂກຣິນໂທ ສະບັບທີ 1 ແລະ 2"
  description: "ຄົນເຮົາໄດ້ຂຽນຈົດໝາຍມາຕັ້ງແຕ່ສະໄໝບູຮານ ແລະ ພວກເຮົາກໍຍັງສືບຕໍ່ຂຽນ ຢູ່ຈົນເຖິງທຸກວັນນີ້. ພວກເຮົາຂຽນ ແລະ ສົ່ງຈົດໝົດດ້ວຍວິທີທີ່ທັນສະໄໝຂຶ້ນ. ເພາະສ່ວນໃຫຍ່ແລ້ວ ອີເມລໄດ້ເຂົ້າມາແທນທີ່ເຈ້ຍ, ນ້ຳມຶກ, ຊອງຈົດໝາຍ ແລະ ສະແຕມຕ່າງໆ. ແຕ່ບໍ່ວ່າພວກເຮົາຈະຂຽນຈົດໝາຍດ້ວຍວິທີໃດໃນປະຈຸບັນ, ພວກເຮົາກໍຍັງຂຽນຈົດໝາຍດ້ວຍເຫດຜົນດຽວກັນກັບຜູ້ຄົນໃນສະໄໝກ່ອນ. ນັ້ນຄື: ພວກເຮົາຕ້ອງການຕິດ ຕໍ່ພົວພັນກັບຜູ້ອື່ນ, ແລກປ່ຽນຂໍ້ມູນ, ຄວາມຮູ້ສຶກ ແລະ ແນວຄິດ."
