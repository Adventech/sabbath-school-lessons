  title: "แก่นแท้ของชีวิตและการเป็นพยานของคริสเตียน"
  description: "การเขียนจดหมายเป็นกิจกรรมที่มีมาแต่โบราณและไม่เคยล้าสมัย เพียงแต่วิธีการเขียนจดหมายเปลี่ยนไปเท่านั้น ใช่แล้ว สื่อสังคมออนไลน์เข้ามาแทนที่กระดาษ แต่ในสาระสำคัญแล้ว อีเมลและจดหมายอิเล็กทรอนิกส์รูปแบบอื่นๆ ก็ทำหน้าที่เหมือนกัน คือเชื่อมโยงผู้คนเข้าด้วยกันผ่านการแลกเปลี่ยนข้อมูล ความรู้สึก และความคิด ทำไมผู้คนจึงเขียนจดหมาย คำตอบหนึ่งที่เป็นไปได้คือพวกเขามีบางสิ่งที่อยากจะบอก อัครทูตเปาโลก็เช่นกัน แม้ว่าท่านจะมีเรื่องมากมายที่อยากพูด แต่เปาโลไม่ได้มีโอกาสพบหน้ากับผู้ที่ท่านต้องการสนทนาด้วยเสมอไป"
