  title: "ဒိၣ်ထီၣ်လၢတၢ်၇့လိၥ်မုၥ်လိၥ်သး ဃုၥ်ဒီးယွၤအပူၤ"
  description: "နဒိၣ်ထီၣ်ဒ်အမ့ၢ်ၦၤမုၢ်နွံနံၤဖိတဂၤ မ့တမ့ၢ် နဒိးန့ၢ်တၢ်စူၢ်တၢ်နၥ် အသီမ့ၢ်ဂ့ၤ, နဖးအိၣ်ဘှံးနံၤတၢ်မၤလိအါအါ မ့တမ့ၢ် စှၤဒၣ်လဲၥ်မ့ၢ်ဂ့ၤ, ဒီးလၢ အကတၢၢ်န့ၣ် နနီၢ်ကစၢ်ဒၣ်နဲ အိၣ်ဒီးနီၢ်သးအဂံၢ်အဘါဆံးအါဆံးအါလၢ မုၢ်မဆါတနံၤညါအံၤဘၣ်ဆၣ်, တၢ်ဂ့ၢ်မိၢ်ၦၢ်လၢအမ့ၢ်တၢ်ဒိၣ်ထီၣ်လၢတၢ်၇့လိၥ် မုၥ်လိၥ်သးဒီးယွၤလၢအခီပညီအိၣ်ဝဲန့ၣ် မ့ၢ်တၢ်လၢအ၇့ဒိၣ်မးတမံၤန့ၣ်လီၤ."
