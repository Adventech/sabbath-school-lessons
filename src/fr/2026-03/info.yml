  title: "1 et 2 Corinthiens"
  description: "Ecrire des lettres est une activité ancienne qui n’a jamais perdu sa pertinence. Ce sont simplement les moyens qui ont changé. Certes, les réseaux sociaux ont remplacé le papier. Cependant, dans leur essence, les courriels et autres formes de communication électronique remplissent la même fonction: ils permettent aux personnes d’échanger des informations, des sentiments et des pensées."
