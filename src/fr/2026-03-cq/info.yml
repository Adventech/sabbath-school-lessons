---
  title: "Jésus: les dernières scènes de son ministère terrestre"
  description: "La Bible fait une déclaration incroyable au sujet de Dieu dans 1 Jean 4.8 : Dieu est amour. Elle ne dit pas qu’il possède simplement une certaine quantité d’amour ou que son amour est occasionnel, mais plutôt qu’il est l’incarnation et la source même de tout amour véritable. Dans 1 Corinthiens 13.5, on découvre que l’amour, en raison de sa nature même, n’est pas égocentrique, mais qu’il se focalise sur les autres. Nulle part cet amour « centré sur les autres » n’est plus clairement illustré que dans les dernières scènes du ministère terrestre de Jésus."
