---
  title: "Les deux épîtres aux Corinthiens"
  description: "Écrire des lettres est une activité très ancienne qui n’est pas pour autant devenue obsolète. Nous avons simplement changé notre manière de le faire. Les réseaux sociaux ont en effet remplacé le papier. Mais fondamentalement, les courriels et autres formes de lettres électroniques ont la même fonction : ils relient les personnes par le biais d’échanges d’informations, de sentiments et de pensées."
