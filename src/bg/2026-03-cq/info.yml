  title: "Заключителните сцени"
  description: "Библията твърди нещо невероятно за Бога в 1 Йоан 4:8: Бог е любов. Не казва, че Той просто притежава определено количество любов или пък че от време на време е обичлив – Той е въплъщението и източникът на всяка истинска любов. От 1 Коринтяни 13:5 научаваме, че по своята природа любовта не е себична – вниманието ѝ е към другите. Никъде другаде не можем да намерим по-ярко проявление на този фокус освен в заключителните сцени от земния живот на Исус."
