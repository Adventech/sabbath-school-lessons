---
  title: "ക്രിസ്തീയ ജീവിതത്തിൻ്റെയും സാക്ഷ്യത്തിൻ്റെയും സാരാംശം"
  description: "കത്തുകൾ എഴുതൽ എന്നത് പഴയകാലം മുതൽ നിലവിലിരിക്കുന്ന കാലഹരണപ്പെട്ടിട്ടില്ലാത്ത ഒരു പ്രവർത്തനമാണ്. കത്തുകൾ എഴുതുന്ന രീതി മാത്രമാണ് നാം മാറ്റിയത്. അതേ, സമൂഹ മാധ്യമം കടലാസിനെ മറികടന്നു. എന്തായാലും അവയുടെ സാരാംശത്തിൽ, ഇ-മെയിലുകളും മറ്റ് ഇലക്ട്രോണിക് കത്തുകളും അടിസ്ഥാനപരമായി ഒരേ പ്രവർത്തനം നിർവ്വഹിക്കുന്നു: വിവരങ്ങൾ, വികാരങ്ങൾ, ചിന്തകൾ എന്നിവ കൈമാറ്റം ചെയ്തുകൊണ്ട് അവ ജനങ്ങളെ ബന്ധിപ്പിക്കുന്നു."
