  title: "Ireo tranga farany teo amin'ny fiainan'i Jesosy"
  description: "Manao fanambarana mahatalanjona momba an'Andriamanitra ny Baiboly ao amin'ny 1 Jao. 4:8: Andriamanitra dia fitiavana. Tsy milaza fotsiny izany fa be fitiavana Izy na koa tia indraindray, fa Izy mihitsy no fanehoana ny fitiavana sy loharanon'ny tena fitiavana rehetra. lanarantsika ao amin'ny 1 Kor. 13:5 fa ny tena fitiavana dia tsy mitady ny azy fa mihevitra ny hafa. Nandritra ireo toe-javatra farany teo amin'ny fiainan'i Kristy teto an-tany no nahitana indrindra izany fitiavana miompana amin'ny hafa izany."
