  description: "Ho ngola mangolo ke ntho’a khale koana e song ho tsoe fesheneng le kajeno. Re mpa re fetotse tsela eo re ngolang mangolo ka eona feela. E, likhokahano tsa sechaba li nkile sebaka sa pampiri. Leha ho le joalo, bakeng sa tsona, li-imeile le mefuta e meng ea mangolo a motlakase li etsa mosebetsi o tšoanang: li hokahanya batho ka ho arolelana tlhahiso-leseling, maikutlo le menahano."
