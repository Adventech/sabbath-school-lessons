  title: "1 en 2 Korintiërs"
  description: "Briefwisseling is ’n eeue-oue aktiwiteit wat nog nie in onbruik geraak het nie. Ons het bloot die wyse waarop briewe geskryf word, verander. Hoewel sosiale media inderdaad [die skryf van briewe op] papier vervang het, verrig e-posse en ander vorms van elektroniese boodskappe dieselfde funksie as dié van briefwisseling op papier: deur die uitruil van inligting, gevoelens en gedagtes bring dit mense in kontak met mekaar. Waarom skryf mense briewe? ’n Mens sou kon sê, ons doen dit omdat ons iets het om vir mekaar te sê. Ons bespeur hierdie dryfveer ook by Paulus. Hoewel die apostel baie te sê gehad het, het hy nie altyd die geleentheid gehad om daardie inligting van aangesig tot aangesig oor te dra aan diegene met wie hy in gesprek wou tree nie. So besluit Paulus toe om sendbriewe te skryf. ’n Voorbeeld hiervan is dié aan die Korintiërs, ’n sendbrief wat die diepsinnigste Bybelwaarhede bevat. Hier is twee [sulke juwele]: “Ek het my voorgeneem om met julle oor niks anders te praat nie as oor Jesus as die Christus, en wel oor Hom as die gekruisigde” (1 Kor. 2:2, NAB); “Want julle ken die genade van onse Here Jesus Christus, dat Hy, alhoewel Hy ryk was, ter wille van julle arm geword het, sodat julle deur sy armoede ryk kan word” (2 Kor. 8:9, OAB). Voorts het ons daardie manjefieke beskrywing van die liefde in 1 Korintiërs 13! Daarteenoor kom die [moderne] leser uiteraard ook verbysterende dinge in Paulus se sendbriewe aan die Korintiërs teë. Nie net het die destydse kerk met ’n aantal, gewigtige probleme (soos seksuele losbandigheid onder lidmate) te kampe gehad nie, maar ook met haarklowery vanweë ’n onsinnige partydigheid onder die gelowiges. Dink jy jóú gemeente sit met ’n hoop probeme? Wag net tot jy die Korintiërs s’n sien — dit het die arme Paulus soos ’n fratsgolf getref! Dalk is jou gemeente se probleme, [op die keper beskou], nie so gewigtig as wat jy aanvanklik gemeen het nie. Waarskynlik sal jy aanstons sien dat die Korintiërs met veel erger dinge gestoei het."
