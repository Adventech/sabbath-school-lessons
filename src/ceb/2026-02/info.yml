  description: "Bisan kung nagtubo ka ingon nga usa ka Adbentista o bag-o sa pagtoo; bisan kon nakabasa ka og daghan o diyutay sa Leksyon sa Eskwela Sabatika; ug, sa katapusan, bisan diin ikaw mahimutang sa imong espirituhanon kinabuhi karon, ang topiko kon unsaon pagtubo diha sa usa ka makahuloganong relasyon sa Dios mahinungdanon kaayo."
