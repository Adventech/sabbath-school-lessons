  description: "စာရေးခြင်းသည် ရှေးအစဉ်အလာကတည်းကစ ရှိခဲ့သောအလေ့အထ ဖြစ်ပြီး ယနေ့ထိတိုင်အောင် မပျောက်ကွယ်သေးပါ။ စာရေးသည့်နည်းလမ်း ကိုသာ ပြောင်းလဲလိုက်ခြင်းဖြစ်သည်။ ဟုတ်ပါသည်။ လူမှုမီဒီယာများသည် စက္ကူစာများကို အစားထိုးလာခဲ့ကြသည်။ သို့သော် ၎င်းတို့၏အနှစ်သာရတွင် အီးမေးလ်နှင့် အခြားအီလက်ထရွန်နစ်စာများသည်လည်း အချက်အလက်၊ ခံစားချက်များနှင့် အတွေးအခေါ်များကို ဖလှယ်ခြင်းဖြင့် ဆက်သွယ်မေးမြန်း နိုင်စွမ်းအတူတူပင် ရှိ၏။"
