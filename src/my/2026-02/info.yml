  description: "သင်သည် သတ္တမနေ့အသင်းတော်အတွင်း ကြီးပြင်းလာသူဖြစ်စေ၊ ယုံကြည်သူအသစ်ပဲဖြစ်စေ၊ လူကြီးတန်းဥပုသ်စာ‌ဖြေ နည်းနည်းဖတ်ဖူးသူဖြစ်စေ၊ များများဖတ်ဖူးသည်ဖြစ်စေ၊ ယနေ့သင့်ဝိညာဉ်ရေးအ‌ခြေအနေ သိ^မသိဖြစ်စေ၊ ထာဝရဘုရားနှင့် အဓိပ္ပါယ်ရှိသော ဆက်ဆံရေးတစ်ခုတည်ဆောက်ရန် မည်သို့ တိုးတက်အောင် လုပ်ရမည်ဟူသည့် အ‌ကြောင်းအရာသည် အလွန်အရေးကြီး သည်။"
