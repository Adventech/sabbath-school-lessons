  title: "ဆၧဒိၪထၪ့ထီၫထၪ့လၧဆၧဘၪထွ့ၫဖံၭ၁ိၭလိၬ၁ၭ လၧကဆါယွၩ"
  description: "မွဲနဂဲၫဒိၪထၪ့လၧ ၦမုၬနွ့ၫနံၩဆၧအီၪကီၪ့ဖၧၩ့မွဲဂ့ၩ, ဒဲအ့ၪမွဲၦအ၁ၫ့လဂၩ လၧဆၧဆူဆၧနဲၩယီၩမွဲဂ့ၩ, ထီးမွဲနဖီဘၪမး၁ံၫနံၩဆၧမၩလိၪယီၩတၭ နမိ၁့ၪယၫ ဘၪဆၧအကၧၩ့ဒိၪထုၬလမံၩ့နီၪ မွဲ၀့ၫဒၪဆၧဒိၪထၪ့ (ဆၧအၪထၪ့ဂီထၪ့) လၧဆၧ ဘၪထွ့ၫဖံၭ၁ိၭလိၬလမံၩ့ကဆါယွၩအဆၧမၩအ၁ၭနီၪလီၫ."
