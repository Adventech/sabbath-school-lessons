---
  title: "၁ ကီရံၫ့ ဒဲ ၂ ကီရံၫ့"
  description: "ဆၧကွ့ၭလံၬပရၧၫ့နီၪ အီၪ၀့ၫယံၬလ့ၬယူၭလၧ ဖျိၩ့ဖျိၩ့အီၩလါနၫ့ဂ့ၩအထီလူၬ ယူၭ (?ခတ်နောက်ကျ) နီၪအီၪ၁့ၪအ့ၬ. အီၪဒၪလံၬလဲအခံးအဂၩ့အၪ့လဲၩအ၁ၭ လမံၩ့လီၫ. မွဲမၬ, ၡၩခံးဂးဆၧဆုးကျိၭအဖျီၩ့ (social media) နီၪ အၪ့လဲၩခွံၬ စၭခီၫအလးယူၭလီၫ. လါနၫ့ဂ့ၩ, ဆၧထံၫဆၧဒီၪအ၁ၭမွဲအီၪမီၪ့ဎီၩ့ (မီၪ့မီၪ့) ဒၪလီၫ-ဆုးကျိၭခမျၧး၁ံၪလၧ ဆၧဒုၭဘိၭဘၪ၁့ၪယၫလိၬ၁ၭလါခီၫလါခီၫ, ဖ့ၪနၩ့လၩ့ ဆၧပရၧၫ့၁ံၪ, ဆၧ၁ၭဘၪထိး (feelings) ၁ံၪ, ဒဲဆၧစီၪဆီၫ့မီၪ့ဆၧ၁ံၪလဖၪနီၪ လီၫ."
