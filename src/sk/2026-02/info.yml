---
  title: "Rast vo vzťahu s Bohom"
  description: "Každý z nás má za sebou inú duchovnú skúsenosť. Niektorí sme vyrastali v rodine adventistov siedmeho dňa, ďalší majú skúsenosť s inou kresťanskou denomináciou, a pre niektorých sú otázky viery úplne nové. Ty sám už možno študuješ úlohy sobotnej školy roky. Alebo je toto tvoje úplne prvé štúdium Biblie. Nech sa na svojej duchovnej ceste nachádzaš kdekoľvek, téma rastu a živého vzťahu s Bohom je kľúčová pre každého z nás."
