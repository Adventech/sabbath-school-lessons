  title: "1 no 2 Abasekorinte"
  description: "Ukubhalwa kwezincwadi kungumkhuba omdala obulokhu wenzeka, nokuyinto engazange iyekwe ukwenziwa. Into eyenzekile ngukuthi kushintshwe indlela izincwadi ezibhalwa ngayo. Kuliqiniso ukuthi esikufunda ezinkundleni zokuxhumana sekufundwa kakhulu ukudlula lokho okubhalwe kumaphepha-ndaba. Noma kunjalo, ubunjalo bokubhalwa kwama-email kanye nokunye okutholakala emishinini yezokuxhumana kusenza umsebenzi ofanayo: Kuhlanganisa abantu ngokuthi bakwazi ukwabelana ngolwazi nangemizwa kanye nalokhu abasuke bekucabanga."
