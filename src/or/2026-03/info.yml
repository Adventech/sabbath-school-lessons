  description: "ଚିଠି ଲେଖିବା ଏକ ବହୁ ପୁରାତନ ଅଭ୍ୟାସ, ଯାହା ଆଜି ବି ହଜିଯାଇନାହିଁ। କେବଳ ଚିଠି ଲେଖିବାର ଢଙ୍ଗ ବଦଳିଯାଇଛି । ଆଗେ ଲୋକେ କାଗଜରେ ଲେଖୁଥିଲେ, ଏବେ ସୋସିଆଲ ମିଡିଆ ବା ଇମେଲ୍ ବ୍ୟବହାର କରୁଛନ୍ତି । କିନ୍ତୁ ଏହାର ଉଦ୍ଦେଶ୍ୟ ସେହି ସମାନ ପରସ୍ପର ସ‌ହ ସୂଚନା ଓ ନିଜର ମନର କଥା ବାଣ୍ଟିବା ।"
