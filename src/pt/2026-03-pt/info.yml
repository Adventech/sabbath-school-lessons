  title: "I e II Coríntios: A Essência da Vida e do Testemunho Cristãos"
  description: "Escrever cartas é uma atividade antiquíssima que ainda não se tornou obsoleta. Apenas mudámos o modo como as cartas são escritas. Sim, as redes sociais substituíram o papel. No entanto, na sua essência, os e-mails e outras formas de cartas eletrónicas realizam, basicamente, a mesma função: Elas ligam as pessoas ao permitirem a troca de informações, de sentimentos e de pensamentos."
