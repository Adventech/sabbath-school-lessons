  title: "Resgate: As cenas finais da vida de Cristo"
  description: "Neste trimestre, vamos acompanhar de perto as cenas finais da vida de Jesus. Nas seis primeiras semanas, refletiremos sobre Seus últimos gestos e ensinamentos antes da prisão. Nas sete semanas seguintes, seguiremos a jornada de Jesus do Getsêmani até a ressurreição. Trata-se de um estudo intenso e cheio de esperança, capaz de mudar o rumo da nossa vida."
