  title: "Pathian Nêna Kan Inzawmna Ti Nghet Zual Zêlin"
  description: "Seventh-day Adventist chhûngkuaa piang leh sei lian i ni emaw, tûn hnâi lawka kohhran rawn zawm thar ve chauh i ni emaw; Puitling Sabbath School Zirlâi Bu hi kum eng emaw zât chhûng i lo zir tawh thîn a ni emaw, tlêm azâwng chauh i lo la chhiar ve a ni emaw; a nih loh leh, thlarau mi tak niin i inhria emaw, ni hran lo niin i inhria emaw pawh a ni maithei. I dinhmun chu eng pawh lo ni se, Pathian nêna inzawmna nung leh nghet neih dân tûr chungchâng hi chu i tân pawh thupui pawimawh tak a ni reng tho mai."
