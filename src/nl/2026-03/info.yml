   title: "1 en 2 Korintiërs"
   description: "Jezus komt snel. Deze tijd vraagt om een- heid in Christus, om een ongeëvenaarde openheid voor de heilige Geest, om een ijverig gebruik van onze geestelijke gaven en voor een diepgaande wandel met onze opgestane Heer. Nu is de tijd om als chris- tenen aan de slag te gaan, dienstbaar te zijn als rentmeesters en zendelingen, geestelijk oorlog te voeren tegen onjuiste leerstel- lingen en te groeien in genade, liefde en onderlinge eenheid. Nu is de tijd om ons vast te klampen en trouw te zijn aan de boodschap van het kruis. De brieven van Paulus aan de Korintiërs leren ons dat te doen."
