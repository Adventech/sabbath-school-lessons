  title: "Kjarni kristilegs lífernis og vitnisburðar"
  description: "Bréfaskriftir eru aldagömul hefð sem hefur ekki orðið úrelt. Við höfum einungis breytt því hvernig bréfin eru skrifuð. Samfélagsmiðlar eru komnir í stað pappírs. En í grundvallaratriðum gegna tölvupóstar og önnur rafræn bréf sama hlutverki, sem sé að hafa samband við aðra með því að skiptast á upplýsingum, tilfinningum og hugsunum."
