---
  title: "Le scene conclusive"
  description: "La Bibbia fa una dichiarazione incredibile su Dio in 1 Giovanni 4:8: Dio è amore. Non dice semplicemente che possiede una certa quantità di amore o che occasionalmente è amorevole, ma che egli è l’incarnazione e la fonte di tutto il vero amore. In 1 Corinzi 13:5 apprendiamo che l’amore, per sua stessa natura, non è egocentrico: si concentra sugli altri. Il luogo in cui questo amore «incentrato sugli altri» è mostrato più vividamente sono le scene conclusive della vita di Gesù sulla terra."
