---
  title: "Růst ve vztahu s Bohem"
  description: "Každý z nás má za sebou jinou duchovní zkušenost. Někteří z nás vyrůstali v rodině adventistů sedmého dne, další mají zkušenost s jinou křesťanskou denominací a pro některé jsou otázky víry zcela nové. Ty sám už možná studuješ úkoly sobotní školy mnoho let, nebo naopak je toto čtvrtletí pro tebe úplně první. Ať se na své duchovní cestě nacházíš kdekoli, to, jak roste náš živý vztah s Bohem, je klíčové pro každého."
