  title: "Urwandiko rwa 1 n'urwa 2 Pawulo Yandikiye Abakorinto"
  description: "Kwandika inzandiko (amabaruwa) ni igikorwa kimaze igihe kirekire kitigeze kirekeraho gukorwa. Twahinduye gusa uburyo inzandiko zandikwa. Ni koko, imbuga nkoranyambaga zasimbuye impapuro. Ariko kandi, mu kamaro kabwo, ubutumwa bwo kuri interineti n'ubundi buryo bwo kohererezanya ubutumwa bunyuze kuri murandasi bukora kimwe: buhuza abantu bakagirana umushyikirano binyuze mu guhanahana amakuru, ibyiyumvo n'ibitekerezo."
